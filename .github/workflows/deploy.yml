name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        run: cd site && npm ci

      - name: Build site
        run: cd site && npm run build

      - name: Copy built site to root for deployment
        run: |
          mkdir -p public
          cp -r site/index.html site/catalog.html site/404.html site/about.html site/*.xml site/*.txt site/post public/ 2>/dev/null || true
          cp site/style.css site/*.js public/ 2>/dev/null || true
          mkdir -p public/assets
          cp -r site/assets/* public/assets/ 2>/dev/null || true

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          force_orphan: true

      - name: Build summary
        run: |
          echo "✅ Build successful"
          echo "📊 Output directory: site/"
          echo "🌐 Live at: https://dineshkuppan.dev"
